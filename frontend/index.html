<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谛听 v4.5 - 智能会议语音认知系统</title>
<style>
/* ============================================================
   DiTing v4.5 - Global Styles (with wavesurfer.js integration)
   ============================================================ */
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #181b24;
  --bg-tertiary: #1e2130;
  --bg-card: #1a1d28;
  --border: #2a2d3a;
  --border-active: #3a3f55;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0b0;
  --text-muted: #5f6577;
  --accent-blue: #4A90D9;
  --accent-orange: #E8743C;
  --accent-green: #50B86C;
  --accent-red: #e0556a;
  --accent-yellow: #e8b83c;
  --accent-purple: #8b6ce8;
  --gradient-brand: linear-gradient(135deg, #4A90D9 0%, #8b6ce8 100%);
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 34px; height: 34px;
  background: var(--gradient-brand);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-title {
  font-size: 16px; font-weight: 700;
  background: var(--gradient-brand);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-subtitle { font-size: 11px; color: var(--text-muted); }
.header-info { display: flex; align-items: center; gap: 12px; }
.header-meeting-title { font-size: 12px; color: var(--text-secondary); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.header-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
}

/* ── Main Layout ── */
.main-container {
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: 1fr auto;
  gap: 10px;
  padding: 10px 20px;
  height: calc(100vh - 180px);
}

/* ── Transcript Panel ── */
.transcript-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.transcript-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg-tertiary);
}
.transcript-header h3 { font-size: 13px; font-weight: 600; }
.transcript-body {
  flex: 1; overflow-y: auto; padding: 8px;
}
.transcript-body::-webkit-scrollbar { width: 4px; }
.transcript-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Segment Card (v4.5: with waveform) ── */
.segment {
  margin-bottom: 8px;
  background: var(--bg-card);
  border-radius: 8px;
  border-left: 3px solid transparent;
  overflow: hidden;
  animation: slideIn 0.35s ease;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.segment.playing {
  border-left-color: var(--accent-purple);
  box-shadow: 0 0 12px rgba(139,108,232,0.15);
}
.segment.has-audio { cursor: pointer; }
.segment.has-audio:hover { border-left-color: var(--accent-blue); }
.segment.no-audio { cursor: default; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.segment-top {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px 2px 10px;
}
.segment-index { font-size: 10px; color: var(--text-muted); font-weight: 600; min-width: 28px; }
.segment-speaker { font-size: 11px; font-weight: 600; }
.segment-time { font-size: 10px; color: var(--text-muted); font-family: 'SF Mono', 'Cascadia Code', monospace; }
.segment-dur { font-size: 10px; color: var(--text-muted); }
.segment-snr {
  margin-left: auto; font-size: 10px; padding: 1px 6px;
  border-radius: 8px; font-weight: 500; white-space: nowrap;
}
.segment-snr.high { background: rgba(80,184,108,0.15); color: var(--accent-green); }
.segment-snr.medium { background: rgba(232,184,60,0.15); color: var(--accent-yellow); }
.segment-snr.low { background: rgba(224,85,106,0.15); color: var(--accent-red); }

.segment-play-btn {
  background: none; border: 1px solid var(--border-active); border-radius: 50%;
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-secondary); font-size: 10px;
  transition: all 0.2s; flex-shrink: 0;
}
.segment-play-btn:hover { background: var(--accent-purple); border-color: var(--accent-purple); color: white; }
.segment-play-btn.playing { background: var(--accent-purple); border-color: var(--accent-purple); color: white; }

/* ── Waveform Container ── */
.segment-waveform {
  margin: 4px 10px 2px 10px;
  height: 44px;
  border-radius: 4px;
  overflow: hidden;
  background: rgba(0,0,0,0.25);
  position: relative;
}
.segment-waveform canvas { display: block; }
.segment-waveform-placeholder {
  height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(90deg, rgba(74,144,217,0.06) 0%, rgba(139,108,232,0.06) 100%);
  border-radius: 4px; margin: 4px 10px 2px 10px;
}
.segment-waveform-placeholder .mini-wave {
  display: flex; align-items: flex-end; gap: 1px; height: 20px;
}
.segment-waveform-placeholder .mini-wave-bar {
  width: 2px; background: var(--border); border-radius: 1px;
}

.segment-text {
  padding: 4px 10px 6px 10px;
  font-size: 13px; color: var(--text-primary); line-height: 1.7;
}

/* ── dB Meter (live) ── */
.db-meter {
  display: flex; align-items: center; gap: 4px; padding: 0 10px 4px 10px;
  font-size: 10px; color: var(--text-muted);
}
.db-meter-bar {
  flex: 1; height: 3px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden;
}
.db-meter-fill {
  height: 100%; border-radius: 2px; transition: width 0.1s linear;
  background: linear-gradient(90deg, var(--accent-green), var(--accent-yellow), var(--accent-red));
}
.db-meter-value { min-width: 40px; text-align: right; font-family: monospace; }

.term-highlight {
  color: var(--accent-purple); font-weight: 500;
  border-bottom: 1px dashed rgba(139,108,232,0.4); cursor: pointer;
}
.segment-logic-flag {
  margin: 2px 10px 4px 10px; padding: 4px 8px; border-radius: 4px; font-size: 11px;
  display: flex; align-items: flex-start; gap: 4px;
}
.segment-logic-flag.warning { background: rgba(232,184,60,0.1); border: 1px solid rgba(232,184,60,0.3); color: var(--accent-yellow); }
.segment-logic-flag.resolved { background: rgba(80,184,108,0.1); border: 1px solid rgba(80,184,108,0.3); color: var(--accent-green); }

/* ── Global Audio Bar ── */
.global-audio-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 14px;
  background: var(--bg-tertiary);
  border-top: 1px solid var(--border);
  min-height: 28px;
}
.global-audio-bar .audio-status {
  font-size: 10px; color: var(--text-muted);
  display: flex; align-items: center; gap: 4px;
}
.global-audio-bar .audio-status .pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-green);
  animation: pulse 1.5s ease-in-out infinite;
}
.global-audio-bar .audio-status .pulse.inactive { animation: none; background: var(--text-muted); }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.4); }
}

/* ── Right Sidebar ── */
.sidebar { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sidebar-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.sidebar-card-header {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-tertiary);
  font-size: 12px; font-weight: 600;
}
.sidebar-card-body { padding: 10px 12px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-item { text-align: center; padding: 6px; background: var(--bg-card); border-radius: 6px; }
.stat-value { font-size: 18px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

/* ── Controls Bar ── */
.controls-bar {
  padding: 8px 20px;
  display: flex; gap: 8px; align-items: center;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
}
.btn {
  padding: 6px 16px;
  border: none; border-radius: 6px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  font-family: inherit;
  white-space: nowrap;
}
.btn-primary { background: var(--gradient-brand); color: white; }
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: var(--bg-tertiary); color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--border-active); }
.btn-secondary.active { border-color: var(--accent-blue); background: rgba(74,144,217,0.1); }
.btn-danger { background: rgba(224,85,106,0.15); color: var(--accent-red); border: 1px solid rgba(224,85,106,0.3); }
.progress-bar {
  flex: 1; height: 4px;
  background: var(--bg-tertiary); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gradient-brand); border-radius: 2px;
  transition: width 0.3s ease;
}
.time-display {
  font-size: 12px; font-family: 'SF Mono', 'Cascadia Code', monospace;
  color: var(--text-secondary); min-width: 60px; text-align: center;
}

/* ── Bottom 摘要 ── */
.summary-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  grid-column: 1 / -1;
  max-height: 160px; overflow-y: auto;
}

/* ── Results Panel (v3.1 — ChatGPT minimalist) ── */
.results-panel {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 1fr 1fr 2fr;
  gap: 10px;
  max-height: 210px; overflow: hidden;
}
.results-card {
  background: var(--bg-secondary);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color 0.2s;
}
.results-card:hover { border-color: rgba(255,255,255,0.12); }
.results-card-header {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 12px; font-weight: 500;
  color: var(--text-secondary);
  display: flex; align-items: center; gap: 8px;
  letter-spacing: 0.3px;
}
.results-card-body {
  padding: 12px 14px;
  flex: 1; overflow-y: auto;
  font-size: 12px; line-height: 1.6;
}
.results-card-body::-webkit-scrollbar { width: 3px; }
.results-card-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

/* Hotword card */
.hotword-tag {
  display: inline-block;
  padding: 3px 9px; margin: 2px 4px 2px 0;
  border-radius: 10px; font-size: 11px;
  background: rgba(255,255,255,0.03);
  color: var(--text-secondary);
  transition: all 0.15s;
  cursor: default;
}
.hotword-tag.top {
  background: rgba(80,184,108,0.08); color: #6cc98a;
}

/* Speaker card */
.speaker-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
}
.speaker-row + .speaker-row { border-top: 1px solid rgba(255,255,255,0.04); }
.speaker-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.speaker-name {
  font-size: 11px; font-weight: 500; min-width: 50px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text-primary);
}
.speaker-bars { flex: 1; }
.speaker-bar-bg {
  height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
.speaker-bar-fill {
  height: 100%; border-radius: 2px; transition: width 0.6s ease;
}
.speaker-count {
  font-size: 10px; color: var(--text-muted); min-width: 50px; text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Summary card */
.summary-text {
  line-height: 1.7; color: var(--text-secondary);
  font-size: 12px; margin-bottom: 8px;
}
.summary-section { margin-bottom: 8px; }
.summary-section-title {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  letter-spacing: 0.5px; margin-bottom: 4px;
  text-transform: uppercase; opacity: 0.7;
}
.summary-topic-tag {
  display: inline-block;
  padding: 2px 7px; margin: 1px 3px 3px 0;
  border-radius: 8px; font-size: 10px;
  background: rgba(74,144,217,0.08); color: #6db3f2;
}
.summary-action-item {
  font-size: 11px; padding: 4px 0; line-height: 1.5;
}
.summary-action-item + .summary-action-item { border-top: 1px solid rgba(255,255,255,0.04); }
.summary-empty {
  color: var(--text-muted); opacity: 0.5;
  text-align: center; padding: 18px 0; font-size: 11px;
}

/* ── Toast ── */
.toast {
  position: fixed; top: 70px; right: 20px;
  background: var(--bg-tertiary); border: 1px solid var(--border-active);
  border-radius: 8px; padding: 10px 16px; font-size: 12px;
  z-index: 1000; box-shadow: var(--shadow);
}

/* ── Debug Log Panel ── */
.log-panel {
  position: fixed; bottom: 0; right: 0;
  width: 420px; max-height: 260px;
  background: var(--bg-secondary); border: 1px solid var(--border-active);
  border-radius: 8px 8px 0 0;
  z-index: 500;
  display: none;
  flex-direction: column;
}
.log-panel.visible { display: flex; }
.log-panel-header {
  padding: 6px 12px;
  background: var(--bg-tertiary);
  border-radius: 8px 8px 0 0;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; cursor: pointer;
}
.log-panel-body {
  flex: 1; overflow-y: auto; padding: 6px 10px;
  font-size: 10px; font-family: 'SF Mono', 'Cascadia Code', monospace;
  color: var(--text-secondary);
}

.memory-panel {
  position: fixed; bottom: 0; left: 0;
  width: 460px; max-height: 360px;
  background: var(--bg-secondary); border: 1px solid var(--border-active);
  border-radius: 8px 8px 0 0;
  z-index: 501;
  display: none;
  flex-direction: column;
}
.memory-panel.visible { display: flex; }
.memory-panel-header {
  padding: 6px 12px;
  background: var(--bg-tertiary);
  border-radius: 8px 8px 0 0;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; cursor: pointer;
}
.memory-panel-search { display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--border); }
.memory-panel-search input {
  flex: 1; background: var(--bg-card); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 11px;
}
.memory-panel-body { flex: 1; overflow-y: auto; padding: 8px; }
.memory-item {
  padding: 8px; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
  margin-bottom: 6px; cursor: pointer; background: rgba(255,255,255,0.02);
}
.memory-item:hover { border-color: rgba(74,144,217,0.35); background: rgba(74,144,217,0.06); }
.memory-item-title { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
.memory-item-meta { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.memory-item-preview { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.memory-item-fulltext {
  margin-top: 6px; padding: 6px 7px; border-radius: 6px;
  background: rgba(0,0,0,0.18); color: var(--text-secondary);
  font-size: 11px; line-height: 1.6; white-space: pre-wrap;
  max-height: 118px; overflow: hidden;
}

/* Upload status */
.upload-status-card {
  margin-top: 6px; padding: 8px;
  background: var(--bg-card); border-radius: 6px;
  font-size: 11px;
}
.upload-status-card .stage { color: var(--accent-blue); }
.upload-status-card .done { color: var(--accent-green); }
.optimizer-report { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); }
.optimizer-report-title { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
.optimizer-chip {
  display: inline-block; padding: 2px 7px; margin: 2px 4px 2px 0;
  border-radius: 9px; font-size: 10px;
  background: rgba(74,144,217,0.08); color: #6db3f2;
  border: 1px solid rgba(74,144,217,0.12);
}
.optimizer-tip { font-size: 10px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }

/* ── Live Mic Voice Orb ── */
.mic-orb-panel {
  position: fixed;
  left: 50%;
  bottom: 64px;
  transform: translateX(-50%) translateY(18px) scale(0.96);
  width: 240px;
  min-height: 150px;
  padding: 18px 18px 14px;
  border: 1px solid rgba(74,144,217,0.18);
  border-radius: 24px;
  background: rgba(15,17,23,0.72);
  box-shadow: 0 18px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  opacity: 0;
  pointer-events: none;
  z-index: 450;
  transition: opacity 0.22s ease, transform 0.22s ease, border-color 0.22s ease;
}
.mic-orb-panel.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0) scale(1);
}
.mic-orb-panel.listening {
  border-color: rgba(139,108,232,0.42);
}
.mic-orb-wrap {
  position: relative;
  width: 92px;
  height: 92px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mic-orb-ring,
.mic-orb-glow {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  transform: scale(var(--orb-scale, 1));
  transition: transform 0.08s linear, opacity 0.08s linear;
}
.mic-orb-ring {
  border: 1px solid rgba(139,108,232,0.48);
  opacity: var(--orb-ring-opacity, 0.35);
  box-shadow: 0 0 var(--orb-shadow, 18px) rgba(139,108,232,0.42);
}
.mic-orb-glow {
  background: radial-gradient(circle at 35% 28%, rgba(255,255,255,0.98), rgba(112,190,255,0.95) 18%, rgba(139,108,232,0.74) 48%, rgba(74,144,217,0.18) 72%, rgba(74,144,217,0) 100%);
  filter: blur(var(--orb-blur, 0.5px));
  opacity: var(--orb-glow-opacity, 0.82);
}
.mic-orb-core {
  position: relative;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: radial-gradient(circle at 36% 28%, #ffffff 0%, #bfe8ff 22%, #7a8cff 52%, #6b46e8 100%);
  box-shadow: inset -10px -12px 24px rgba(28,18,86,0.38), inset 8px 8px 16px rgba(255,255,255,0.28), 0 0 var(--orb-core-shadow, 20px) rgba(74,144,217,0.58);
  transform: scale(var(--orb-core-scale, 1));
  transition: transform 0.08s linear, box-shadow 0.08s linear;
}
.mic-orb-wave {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 28px;
  margin: 0 auto 8px;
}
.mic-orb-wave span {
  width: 3px;
  height: var(--bar-height, 7px);
  border-radius: 999px;
  background: linear-gradient(180deg, #bfe8ff, #8b6ce8);
  opacity: 0.42;
  transform: scaleY(var(--bar-scale, 0.53));
  transition: height 0.08s linear, transform 0.08s linear, opacity 0.08s linear;
}
.mic-orb-panel.listening .mic-orb-wave span { opacity: 0.82; }
.mic-orb-title {
  font-size: 13px;
  font-weight: 700;
  text-align: center;
}
.mic-orb-subtitle {
  margin-top: 2px;
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Header                                                      -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="header">
  <div class="header-brand">
    <div class="header-logo">E</div>
    <div>
      <div class="header-title">DiTing v4.5</div>
      <div class="header-subtitle">智能会议语音认知系统</div>
    </div>
  </div>
  <div class="header-info">

<script type="module">
// ============================================================
// DiTing v4.5 - Frontend with wavesurfer.js
// ============================================================

// ── Import wavesurfer.js (non-blocking — don't block UI init) ──
let WaveSurfer = null;
let HAS_WAVESURFER = false;

// Load wavesurfer.js asynchronously — do NOT block the UI from initializing.
// If the CDN is unreachable or slow, the page still works fully.
(async function loadWaveSurfer() {
  try {
    // Race against a 5-second timeout so we don't wait forever
    const importPromise = import('https://unpkg.com/wavesurfer.js@7.8/dist/wavesurfer.esm.js');
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('CDN timeout')), 5000)
    );
    const wsModule = await Promise.race([importPromise, timeoutPromise]);
    WaveSurfer = wsModule.default;
    HAS_WAVESURFER = true;
    console.log('[DiTing] WaveSurfer.js loaded');
  } catch (e) {
    console.warn('[DiTing] WaveSurfer.js unavailable — waveform disabled:', e.message);
    WaveSurfer = null;
    HAS_WAVESURFER = false;
  }
})();

// ── Constants ────────────────────────────────────────────────
const API_BASE = 'http://localhost:8765';

// ── DOM refs ─────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const transcriptBody = $('transcriptBody');
const emptyState = $('emptyState');
const globalAudioBar = $('globalAudioBar');
const audioPulse = $('audioPulse');
const audioStatusText = $('audioStatusText');
const audioTimeDisplay = $('audioTimeDisplay');
const segmentCounter = $('segmentCounter');
const progressFill = $('progressFill');
const timeDisplay = $('timeDisplay');
const meetingTitleDisplay = $('meetingTitleDisplay');
const connectionStatus = $('connectionStatus');
const xasrStatus = $('xasrStatus');
const statSegments = $('statSegments');
const statLogicFlags = $('statLogicFlags');
const statLowConf = $('statLowConf');
const statCorrections = $('statCorrections');
const overallConfBar = $('overallConfBar');
const overallConfText = $('overallConfText');
const processingPanel = $('processingPanel');
const logicPanel = $('logicPanel');
const summaryPanel = $('summaryPanel');
const micStatus = $('micStatus');
const micOrbPanel = $('micOrbPanel');
const micOrbWrap = $('micOrbWrap');
const micOrbWave = $('micOrbWave');
const micOrbTitle = $('micOrbTitle');
const micOrbSubtitle = $('micOrbSubtitle');
const hotwordCard = $('hotwordCard');
const speakerCard = $('speakerCard');
const summaryCard = $('summaryCard');

// ── State ────────────────────────────────────────────────────
let allSegments = [];
let currentSegmentIndex = -1;
let isPlaying = false;
let playbackTimer = null;
let demoData = null;

// Upload
let uploadWs = null;
let uploadFileId = null;
let uploadHttpResult = null;   // fallback: HTTP response when WS doesn't deliver
let uploadWsDelivered = false; // whether WS delivered any segments
let uploadAbortController = null;
let uploadFallbackTimer = null;
let uploadCloseFallbackTimer = null;
let resetGeneration = 0;

// Live mic
let micStream = null;
let micWs = null;
let micAudioContext = null;
let micAnalyser = null;
let micVisualizerRAF = null;
let micLevelSmoothed = 0;
let isRecording = false;

// Log stream

let logVisible = false;

// ═══════════════════════════════════════════════════════════
// AudioPlaybackManager (wavesurfer.js based)
// ═══════════════════════════════════════════════════════════
class AudioPlaybackManager {
  constructor() {
    /** @type {Map<number, {ws: object, blobUrl: string, duration: number}>} */
    this.instances = new Map();
    /** @type {number | null} */
    this.activeIndex = null;
    /** @type {number | null} */
    this.dBUpdateRAF = null;
    this.maxInstances = 40;  // soft cap — destroy oldest when exceeded
  }

  /**
   * Convert base64 WAV to a Blob URL and create a WaveSurfer instance.
   */
  async create(segIndex, audioBase64, containerEl) {
    if (!HAS_WAVESURFER || !audioBase64) return null;

    // Destroy existing instance for this index (shouldn't happen, but be safe)
    this.destroy(segIndex);

    // Decode base64 → Blob
    let blob;
    try {
      blob = this._b64toBlob(audioBase64, 'audio/wav');
    } catch (e) {
      console.warn(`[Audio] base64 decode failed for seg ${segIndex}:`, e);
      return null;
    }

    const blobUrl = URL.createObjectURL(blob);

    // Create WaveSurfer
    const ws = WaveSurfer.create({
      container: containerEl,
      waveColor: '#3a3f55',
      progressColor: '#8b6ce8',
      cursorColor: 'rgba(139,108,232,0.5)',
      cursorWidth: 1,
      height: 44,
      barWidth: 2,
      barGap: 1,
      barRadius: 2,
      normalize: true,
      interact: true,
      dragToSeek: true,
      autoScroll: false,
    });

    // Wire events
    ws.on('play', () => {
      this._onPlay(segIndex);
    });
    ws.on('pause', () => {
      this._onPause(segIndex);
    });
    ws.on('finish', () => {
      this._onFinish(segIndex);
    });
    ws.on('timeupdate', (t) => {
      this._onTimeUpdate(segIndex, t, ws.getDuration());
    });
    ws.on('ready', () => {
      console.log(`[Audio] 片段 ${segIndex} 波形已就绪，时长=${ws.getDuration().toFixed(1)}s`);
      // 不自动播放，用户点击片段或播放按钮后才播放。
    });
    ws.on('interaction', () => {
      // User clicked the waveform — play it
      this.play(segIndex);
    });

    // Load the blob
    await ws.loadBlob(blob);

    const entry = { ws, blobUrl, duration: ws.getDuration() };
    this.instances.set(segIndex, entry);

    // Evict old instances
    this._evict();

    return entry;
  }

  /**
   * Play a specific segment's audio.
   */
  play(segIndex) {
    const entry = this.instances.get(segIndex);
    if (!entry) return;

    // Pause the currently active one
    if (this.activeIndex !== null && this.activeIndex !== segIndex) {
      const current = this.instances.get(this.activeIndex);
      if (current && current.ws) {
        try { current.ws.pause(); } catch (e) { /* ignore */ }
      }
    }

    this.activeIndex = segIndex;
    try {
      entry.ws.play();
    } catch (e) {
      console.warn(`[Audio] Play failed for seg ${segIndex}:`, e);
    }
  }

  /**
   * Pause the currently active segment.
   */
  pause() {
    if (this.activeIndex === null) return;
    const entry = this.instances.get(this.activeIndex);
    if (entry && entry.ws) {
      try { entry.ws.pause(); } catch (e) { /* ignore */ }
    }
  }

  /**
   * Stop and destroy all instances.
   */
  reset() {
    this.pause();
    this._stopDBUpdates();
    for (const [idx, entry] of this.instances) {
      try { entry.ws.destroy(); } catch (e) { /* ignore */ }
      try { URL.revokeObjectURL(entry.blobUrl); } catch (e) { /* ignore */ }
    }
    this.instances.clear();
    this.activeIndex = null;
    this._updateGlobalUI(false);
  }

  /**
   * Destroy a single instance.
   */
  destroy(segIndex) {
    const entry = this.instances.get(segIndex);
    if (!entry) return;
    if (this.activeIndex === segIndex) {
      this.activeIndex = null;
      this._stopDBUpdates();
    }
    try { entry.ws.destroy(); } catch (e) { /* ignore */ }
    try { URL.revokeObjectURL(entry.blobUrl); } catch (e) { /* ignore */ }
    this.instances.delete(segIndex);
  }

  /**
   * Get the duration of a segment in seconds.
   */
  getDuration(segIndex) {
    const entry = this.instances.get(segIndex);
    return entry ? entry.duration : 0;
  }

  // ── Private helpers ──────────────────────────────────────

  _b64toBlob(b64, mimeType) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return new Blob([bytes], { type: mimeType });
  }

  _onPlay(segIndex) {
    this.activeIndex = segIndex;
    this._startDBUpdates(segIndex);
    this._updateGlobalUI(true);
    this._highlightSegment(segIndex, true);
  }

  _onPause(segIndex) {
    if (this.activeIndex === segIndex) {
      this._stopDBUpdates();
      this._updateGlobalUI(false);
      this._highlightSegment(segIndex, false);
    }
  }

  _onFinish(segIndex) {
    if (this.activeIndex === segIndex) {
      this._stopDBUpdates();
      this._updateGlobalUI(false);
      this._highlightSegment(segIndex, false);
    }
  }

  _onTimeUpdate(segIndex, currentTime, duration) {
    if (this.activeIndex !== segIndex) return;
    const m = Math.floor(currentTime / 60);
    const s = Math.floor(currentTime % 60);
    const dm = Math.floor(duration / 60);
    const ds = Math.floor(duration % 60);
    if (audioTimeDisplay) {
      audioTimeDisplay.textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} / ${String(dm).padStart(2,'0')}:${String(ds).padStart(2,'0')}`;
    }
    // Update dB meter via RMS estimation from the segment's SNR
    this._updateDBMeter(segIndex, currentTime, duration);
  }

  _startDBUpdates(segIndex) {
    this._stopDBUpdates();
    // We don't have real-time PCM access via wavesurfer public API,
    // but we can poll timeupdate and use the segment's SNR + position
    // to simulate dB movement. Real implementation would use AnalyserNode.
    const poll = () => {
      const entry = this.instances.get(segIndex);
      if (!entry || this.activeIndex !== segIndex) {
        this._stopDBUpdates();
        return;
      }
      // Update is handled in _onTimeUpdate
      this.dBUpdateRAF = requestAnimationFrame(poll);
    };
    this.dBUpdateRAF = requestAnimationFrame(poll);
  }

  _stopDBUpdates() {
    if (this.dBUpdateRAF !== null) {
      cancelAnimationFrame(this.dBUpdateRAF);
      this.dBUpdateRAF = null;
    }
  }

  _updateDBMeter(segIndex, currentTime, duration) {
    // Update the dB meter bar for this segment
    const meterFill = document.querySelector(`.db-meter-fill[data-seg="${segIndex}"]`);
    if (!meterFill) return;

    // Simulate dB level based on position in segment
    // (Real implementation would use AnalyserNode from AudioContext)
    const seg = allSegments[segIndex];
    const snr = seg ? (seg.snr_db || 25) : 25;
    // Normalize: higher SNR → quieter noise floor, so dBFS is lower (better)
    // Map: SNR 0→ -30dB, SNR 30→ -5dB
    const baseLevel = -30 + (snr / 30) * 25;
    // Add small variation based on time position
    const variation = Math.sin(currentTime * 8) * 3 + Math.sin(currentTime * 23) * 1.5;
    const dbLevel = Math.max(-60, Math.min(0, baseLevel + variation));

    // Map to 0-100% width (0dB = 100%, -60dB = 0%)
    const pct = ((dbLevel + 60) / 60) * 100;
    meterFill.style.width = Math.max(2, pct) + '%';

    // Color based on level
    if (pct > 70) meterFill.style.background = 'var(--accent-green)';
    else if (pct > 35) meterFill.style.background = 'var(--accent-yellow)';
    else meterFill.style.background = 'var(--accent-red)';
  }

  _updateGlobalUI(active) {
    if (audioPulse) {
      audioPulse.className = 'pulse' + (active ? '' : ' inactive');
    }
    if (audioStatusText) {
      audioStatusText.textContent = active ? '正在播放音频...' : '无音频';
    }
    if (!active && audioTimeDisplay) {
      audioTimeDisplay.textContent = '--:-- / --:--';
    }
  }

  _highlightSegment(segIndex, on) {
    const el = document.querySelector(`.segment[data-seg-index="${segIndex}"]`);
    if (el) {
      if (on) el.classList.add('playing');
      else el.classList.remove('playing');
    }
    const btn = document.querySelector(`.segment-play-btn[data-seg-index="${segIndex}"]`);
    if (btn) {
      if (on) btn.classList.add('playing');
      else btn.classList.remove('playing');
    }
  }

  _evict() {
    if (this.instances.size <= this.maxInstances) return;
    const keys = [...this.instances.keys()].sort((a, b) => a - b);
    const toRemove = keys.slice(0, this.instances.size - this.maxInstances);
    for (const idx of toRemove) {
      if (idx !== this.activeIndex) {
        this.destroy(idx);
      }
    }
  }
}

// Singleton
const audioManager = new AudioPlaybackManager();

// ═══════════════════════════════════════════════════════════
// Utility Functions
// ═══════════════════════════════════════════════════════════

function formatTime(s) {
  if (s === undefined || s === null) return '--:--';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function updateConnectionStatus(status) {
  if (!connectionStatus) return;
  const map = {
    'connected': '已连接',
    'completed': '已完成',
    'disconnected': '离线',
  };
  connectionStatus.textContent = map[status] || status;
}

// ═══════════════════════════════════════════════════════════
// Segment Rendering (with waveform)
// ═══════════════════════════════════════════════════════════

/**
 * Render a single segment card into the transcript body.
 * Creates a waveform container and optionally initializes wavesurfer.
 */
function renderSegment(seg, index, autoPlay = false) {
  if (!transcriptBody) return;
  if (emptyState) emptyState.style.display = 'none';

  const qLabel = seg.quality_label || seg.quality || 'high';
  const displayText = seg.display_text || seg.text || '';
  const snrDb = seg.snr_db != null ? seg.snr_db.toFixed(0) : '--';
  const startSec = seg.start_sec != null ? seg.start_sec : (seg.start || 0);
  const endSec = seg.end_sec != null ? seg.end_sec : (seg.end || 0);
  const dur = (endSec - startSec) || 0;
  const hasAudio = !!(seg.audio_wav_base64);

  // Build logic flags HTML
  let flagsHTML = '';
  if (seg.logic_flags && seg.logic_flags.length > 0) {
    flagsHTML = seg.logic_flags.map(f =>
      `<div class="segment-logic-flag ${f.severity || 'warning'}">
        <span>${f.severity === 'resolved' ? 'OK' : '!'}</span>
        <span>${f.message || ''}</span>
      </div>`
    ).join('');
  }

  // Build the card
  const card = document.createElement('div');
  card.className = 'segment' + (hasAudio ? ' has-audio' : ' no-audio');
  card.setAttribute('data-seg-index', index);

  card.innerHTML = `
    <div class="segment-top">
      <span class="segment-index">#${index + 1}</span>
      <span class="segment-speaker" style="color:var(--accent-blue);">片段 ${index + 1}</span>
      <span class="segment-time">${formatTime(startSec)}</span>
      <span class="segment-dur">(${dur.toFixed(1)}s)</span>
      <span class="segment-snr ${qLabel}">SNR ${snrDb}dB</span>
      ${hasAudio
        ? `<button class="segment-play-btn" data-seg-index="${index}" title="播放/暂停">▶</button>`
        : ''}
    </div>
    ${hasAudio
      ? `<div class="segment-waveform" id="waveform-seg-${index}" data-seg-index="${index}"></div>
         <div class="db-meter">
           <span style="font-size:9px;">dB</span>
           <div class="db-meter-bar"><div class="db-meter-fill" data-seg="${index}" style="width:2%;background:var(--accent-green);"></div></div>
           <span class="db-meter-value">${snrDb}dB</span>
         </div>`
      : `<div class="segment-waveform-placeholder">
           <div class="mini-wave">
             ${Array.from({length: 28}, () => {
               const h = Math.floor(Math.random() * 16 + 4);
               return `<div class="mini-wave-bar" style="height:${h}px;"></div>`;
             }).join('')}
           </div>
         </div>`
    }
    <div class="segment-text">${escapeHTML(displayText)}</div>
    ${flagsHTML}
  `;

  transcriptBody.appendChild(card);

  // Initialize wavesurfer if audio is available
  if (hasAudio && HAS_WAVESURFER) {
    const waveformContainer = card.querySelector(`#waveform-seg-${index}`);
    if (waveformContainer) {
      audioManager.create(index, seg.audio_wav_base64, waveformContainer).then((entry) => {
        if (entry && autoPlay) {
          // Small delay to let the waveform render
          setTimeout(() => audioManager.play(index), 150);
        }
      }).catch(err => {
        console.warn(`[Audio] WaveSurfer init failed for seg ${index}:`, err);
      });
    }
  }

  // Attach click handler to play button
  if (hasAudio) {
    const playBtn = card.querySelector(`.segment-play-btn[data-seg-index="${index}"]`);
    if (playBtn) {
      playBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (audioManager.activeIndex === index) {
          audioManager.pause();
        } else {
          audioManager.play(index);
        }
      });
    }

    // Click on card body (not button) also toggles play
    card.addEventListener('click', (e) => {
      // Don't trigger if clicking the button (handled above)
      if (e.target.closest('.segment-play-btn')) return;
      if (audioManager.activeIndex === index) {
        audioManager.pause();
      } else {
        audioManager.play(index);
      }
    });
  }

  // Scroll to bottom
  transcriptBody.scrollTop = transcriptBody.scrollHeight;
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Sidebar Updates
// ═══════════════════════════════════════════════════════════

function updateStats(segmentsProcessed = null) {
  const segments = allSegments.filter(Boolean);
  const realCount = segmentsProcessed ?? segments.length;
  if (statSegments) statSegments.textContent = realCount;

  const logicCount = segments.reduce((sum, s) => sum + (Array.isArray(s.logic_flags) ? s.logic_flags.length : 0), 0);
  const lowConfCount = segments.reduce((sum, s) => {
    const spans = Array.isArray(s.uncertain_spans) ? s.uncertain_spans.length : 0;
    const uncertainty = s.uncertainty && s.uncertainty.level && s.uncertainty.level !== 'low' ? 1 : 0;
    return sum + spans + uncertainty;
  }, 0);
  const corrCount = segments.reduce((sum, s) => sum + (Array.isArray(s.corrections) ? s.corrections.length : 0), 0);

  if (statLogicFlags) statLogicFlags.textContent = logicCount;
  if (statLowConf) statLowConf.textContent = lowConfCount;
  if (statCorrections) statCorrections.textContent = corrCount;

  const avgConf = segments.length
    ? segments.reduce((sum, s) => sum + Number(s.asr_confidence || 0), 0) / segments.length
    : 0;
  const pct = avgConf > 0 ? Math.round(avgConf * 100) : Math.min(90, 50 + realCount * 3);
  if (overallConfBar) overallConfBar.style.width = pct + '%';
  if (overallConfText) overallConfText.textContent = pct ? pct + '%' : '--';
}

function updateLogicPanel() {
  if (!logicPanel) return;
  const flags = [];
  for (const seg of allSegments) {
    for (const f of (seg.logic_flags || [])) {
      flags.push(f);
    }
  }
  if (flags.length === 0) {
    logicPanel.innerHTML = '<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:10px 0;">暂无逻辑提示</div>';
    return;
  }
  logicPanel.innerHTML = flags.map(f => {
    const icon = f.severity === 'resolved' ? 'OK' : '!';
    return `<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);">
      <span style="color:${f.severity === 'resolved' ? 'var(--accent-green)' : 'var(--accent-yellow)'};">${icon}</span>
      ${f.message || ''}
    </div>`;
  }).join('');
}

const SPEAKER_COLORS = ['#4A90D9', '#E8743C', '#50B86C', '#e8b83c', '#8b6ce8', '#e0556a'];

function resetResultsPanel() {
  if (hotwordCard) hotwordCard.innerHTML = '<div class="summary-empty">提取中…</div>';
  if (speakerCard) speakerCard.innerHTML = '<div class="summary-empty">识别中…</div>';
  if (summaryCard) summaryCard.innerHTML = '<div class="summary-empty">会议处理完成后将自动生成摘要…</div>';
}

function renderResultsPanel(data) {
  if (!data) return;

  if (data.asr_optimizer) {
    renderASROptimizerReport(data.asr_optimizer);
  }
  // 2. 热词
  renderHotwordCard(data.hotwords || []);

  // 3. 说话人分布
  renderSpeakerCard(data.speaker_stats || {});

  // 4. 摘要
  if (data.summary) {
    renderSummaryCard(data.summary);
  }
}

function renderASROptimizerReport(report) {
  if (!processingPanel || !report) return;

  if (report.enabled === false) {
    processingPanel.innerHTML = `<div class="upload-status-card">
      <div class="stage">ASR 优化未启用</div>
      <div style="color:var(--text-muted);">${escapeHTML(report.reason || '当前后端未返回优化报告')}</div>
    </div>`;
    return;
  }

  const profile = report.profile || {};
  const vad = report.vad_config || {};
  const audioActions = report.audio_actions || [];
  const textActions = report.text_actions || [];
  const suggestions = report.suggestions || [];
  const chips = [...audioActions, ...textActions].slice(0, 8)
    .map(a => `<span class="optimizer-chip">${escapeHTML(a)}</span>`).join('');
  const tips = suggestions.slice(0, 3)
    .map(t => `<div class="optimizer-tip">${escapeHTML(t)}</div>`).join('');
  const silencePct = profile.silence_ratio != null ? Math.round(profile.silence_ratio * 100) + '%' : '--';
  const clippingPct = profile.clipping_ratio != null ? (profile.clipping_ratio * 100).toFixed(1) + '%' : '--';

  processingPanel.innerHTML = `<div class="upload-status-card">
    <div class="stage">ASR 优化完成</div>
    <div style="color:var(--text-muted);">时长 ${profile.duration_sec || '--'}s · 静音 ${silencePct} · 动态范围 ${profile.dynamic_range || '--'} · 削波 ${clippingPct}</div>
    <div class="optimizer-report">
      <div class="optimizer-report-title">优化动作</div>
      ${chips || '<span class="optimizer-chip">保持默认优化</span>'}
      <div class="optimizer-tip">VAD 阈值 ${vad.energy_threshold_ratio || '--'} · 静音帧 ${vad.min_silence_frames || '--'} · 最短片段 ${vad.min_segment_duration || '--'}s</div>
      ${tips}
    </div>
  </div>`;
}


function renderHotwordCard(hotwords) {
  const card = document.getElementById('hotwordCard');
  if (!card) return;

  if (!hotwords || hotwords.length === 0) {
    card.innerHTML = '<div class="summary-empty">暂未提取到关键术语</div>';
    return;
  }

  const top = hotwords.slice(0, 20);
  let h = '';
  top.forEach((hw, i) => {
    const cls = i < 5 ? 'hotword-tag top' : 'hotword-tag';
    const label = typeof hw === 'string' ? hw : (hw.word || hw);
    h += `<span class="${cls}">${escapeHTML(label)}</span>`;
  });
  if (hotwords.length > 20) {
    h += `<span class="hotword-tag" style="opacity:0.4;">+${hotwords.length - 20}</span>`;
  }

  card.innerHTML = h;
}

function renderSpeakerCard(stats) {
  const card = document.getElementById('speakerCard');
  if (!card) return;

  if (!stats || Object.keys(stats).length === 0) {
    card.innerHTML = '<div class="summary-empty">暂未识别说话人</div>';
    return;
  }

  const entries = Object.entries(stats).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, e) => s + e[1], 0);

  let h = '';
  entries.forEach(([name, count], i) => {
    const pct = Math.round(count / total * 100);
    const color = SPEAKER_COLORS[i % SPEAKER_COLORS.length];
    h += `<div class="speaker-row">
      <div class="speaker-dot" style="background:${color};"></div>
      <div class="speaker-name" title="${escapeHTML(name)}">${escapeHTML(name)}</div>
      <div class="speaker-bars"><div class="speaker-bar-bg"><div class="speaker-bar-fill" style="width:${pct}%;background:${color};"></div></div></div>
      <div class="speaker-count">${count} 段 (${pct}%)</div>
    </div>`;
  });

  card.innerHTML = h;
}

function renderSummaryCard(summary) {
  const card = document.getElementById('summaryCard');
  if (!card) return;

  const hasContent = (summary.summary && summary.summary.trim()) ||
    (summary.topics && summary.topics.length > 0) ||
    (summary.action_items && summary.action_items.length > 0);

  if (!hasContent) {
    card.innerHTML = '<div class="summary-empty">暂未生成摘要</div>';
    return;
  }

  let h = '';

  if (summary.summary && summary.summary.trim()) {
    h += `<div class="summary-text">${escapeHTML(summary.summary)}</div>`;
  }

  if (summary.topics && summary.topics.length > 0) {
    h += '<div class="summary-section"><div class="summary-section-title">讨论主题</div>';
    summary.topics.forEach(t => {
      const text = typeof t === 'string' ? t : (t.topic || t);
      h += `<span class="summary-topic-tag">${escapeHTML(text)}</span>`;
    });
    h += '</div>';
  }

  if (summary.decisions && summary.decisions.length > 0) {
    h += '<div class="summary-section"><div class="summary-section-title">会议决策</div>';
    summary.decisions.forEach(d => {
      const text = typeof d === 'string' ? d : (d.decision || '');
      h += `<div class="summary-action-item" style="border-left:2px solid var(--accent-yellow);padding-left:8px;">${escapeHTML(text)}</div>`;
    });
    h += '</div>';
  }

  if (summary.action_items && summary.action_items.length > 0) {
    h += '<div class="summary-section"><div class="summary-section-title">待办事项</div>';
    summary.action_items.forEach(a => {
      const task = typeof a === 'string' ? a : (a.task || '');
      const assignee = typeof a === 'object' ? (a.assignee || '') : '';
      const deadline = typeof a === 'object' ? (a.deadline || '') : '';
      const detail = assignee ? `${task} — ${assignee}` : task;
      const suffix = deadline ? ` (${deadline})` : '';
      h += `<div class="summary-action-item">${escapeHTML(detail)}${escapeHTML(suffix)}</div>`;
    });
    h += '</div>';
  }

  card.innerHTML = h;
}

async function startDemo() {
  if (isPlaying) return;
  resetAll();

  try {
    const resp = await fetch(`${API_BASE}/api/meeting/demo`);
    demoData = await resp.json();
  } catch (e) {
    console.log('Using embedded demo data');
    demoData = getEmbeddedDemoData();
  }

  if (meetingTitleDisplay) {
    meetingTitleDisplay.textContent = demoData.title || '演示会议';
  }
  allSegments = demoData.segments || [];

  isPlaying = true;
  const btnStart = $('btnStart');
  if (btnStart) { btnStart.textContent = '演示中...'; btnStart.disabled = true; }
  updateConnectionStatus('connected');

  currentSegmentIndex = -1;
  playNextDemoSegment();
}

function playNextDemoSegment() {
  if (!isPlaying) return;
  currentSegmentIndex++;
  if (currentSegmentIndex >= allSegments.length) {
    finishDemo();
    return;
  }

  const seg = allSegments[currentSegmentIndex];
  renderSegment(seg, currentSegmentIndex, false);  // demo: no audio, no auto-play
  updateStats(currentSegmentIndex + 1);
  updateProgress(currentSegmentIndex);
  if (seg.logic_flags && seg.logic_flags.length > 0) {
    updateLogicPanel();
    for (const f of seg.logic_flags) {
      if (f.severity === 'warning') showToast('逻辑提示：' + (f.message || '').substring(0, 60));
    }
  }

  const delay = 1500;
  playbackTimer = setTimeout(playNextDemoSegment, delay);
}

function finishDemo() {
  isPlaying = false;
  const btnStart = $('btnStart');
  if (btnStart) { btnStart.textContent = '演示'; btnStart.disabled = false; }
  updateConnectionStatus('completed');
  if (demoData && demoData.asr_optimizer) {
    renderASROptimizerReport(demoData.asr_optimizer);
  }
  showToast('演示完成');
}

function updateProgress(segIndex) {
  const pct = ((segIndex + 1) / Math.max(1, allSegments.length)) * 100;
  if (progressFill) progressFill.style.width = pct + '%';
  if (segmentCounter) segmentCounter.textContent = `${segIndex + 1}/${allSegments.length}`;
  const last = allSegments[segIndex];
  if (timeDisplay) timeDisplay.textContent = formatTime(last ? (last.end_sec || last.end || 0) : 0);

// File Upload (with real-time WebSocket + audio waveforms)
// ═══════════════════════════════════════════════════════════

/**
 * Render segments from HTTP response (fallback when WS doesn't deliver).
 */
function handleUploadHTTPResponse(result, generation = resetGeneration) {
  if (generation !== resetGeneration) return;
  if (!result || uploadWsDelivered) return;

  if (result.status === 'completed' && result.segments && result.segments.length > 0) {
    console.log('[Upload] Rendering from HTTP response:', result.segments.length, 'segments');
    uploadWsDelivered = true;  // prevent double processing
    allSegments = result.segments;
    if (transcriptBody) transcriptBody.innerHTML = '';
    result.segments.forEach((seg, i) => renderSegment(seg, i, false));
    if (segmentCounter) segmentCounter.textContent = `${result.segments.length}/${result.segments.length}`;
    updateStats(result.segments_count || result.segments.length);
    updateLogicPanel();
    renderResultsPanel(result);
    if (memoryVisible) loadMemoryHistory();
    showToast(`完成：${result.segments_count || result.segments.length} 个片段`);
    finishUploadUI('complete');
  } else if (result.status === 'demo_mode') {
    uploadWsDelivered = true;  // prevent double processing
    showToast('X-ASR 未加载，使用演示数据');
    if (result.demo_data) {
      demoData = result.demo_data;
      startDemo();
    }
    finishUploadUI('demo');
  } else if (result.status === 'processing') {
    // Server is processing — wait for WS or fallback timer
    console.log('[Upload] Server processing, waiting for WS...');
  }
}

async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const generation = resetGeneration;
  const fileId = generateUUID();
  uploadFileId = fileId;
  uploadHttpResult = null;
  uploadWsDelivered = false;
  const btnUpload = $('btnUpload');
  if (btnUpload) { btnUpload.textContent = '连接中...'; btnUpload.disabled = true; }

  if (uploadWs) { try { uploadWs.close(); } catch(e) {} uploadWs = null; }
  uploadAbortController = new AbortController();

  showToast(`正在上传：${file.name}`);
  if (meetingTitleDisplay) meetingTitleDisplay.textContent = file.name;

  // Clear previous state without cancelling this new upload generation
  resetAll({ cancelTasks: false });
  allSegments = [];

  // Show uploading state
  if (transcriptBody) transcriptBody.innerHTML = '';
  if (emptyState) {
    emptyState.style.display = 'flex';
    const msgEl = emptyState.querySelector('div:nth-child(2)');
    if (msgEl) msgEl.textContent = `处理中：${file.name}`;
  }
  if (processingPanel) {
    processingPanel.innerHTML = `<div class="upload-status-card">
      <div class="stage">正在上传：${file.name}</div>
      <div style="color:var(--text-muted);">${(file.size/1024/1024).toFixed(1)} MB</div>
    </div>`;
  }

  // ── Fallback timer: if WS doesn't deliver within 30s, use HTTP result ──
  uploadFallbackTimer = setTimeout(() => {
    if (generation !== resetGeneration) return;
    if (!uploadWsDelivered && uploadHttpResult) {
      console.log('[Upload] WS timeout — rendering from HTTP fallback');
      handleUploadHTTPResponse(uploadHttpResult, generation);
    } else if (!uploadWsDelivered && !uploadHttpResult) {
      showToast('处理超时，请检查后端日志');
      finishUploadUI('timeout');
    }
  }, 30000);

  try {
    uploadWs = new WebSocket(`ws://localhost:8765/ws/upload/${fileId}`);

    uploadWs.onopen = async () => {
      console.log('[Upload] WS connected');
      if (btnUpload) btnUpload.textContent = '上传中...';

      // Now upload the file via HTTP
      try {
        const formData = new FormData();
        formData.append('file', file);
        const resp = await fetch(`${API_BASE}/api/audio/upload?file_id=${fileId}`, {
          method: 'POST', body: formData, signal: uploadAbortController?.signal,
        });
        const result = await resp.json();
        console.log('[Upload] HTTP status:', result.status);
        uploadHttpResult = result;

        if (generation !== resetGeneration) return;
        if (result.status === 'error') {
          showToast('错误：' + (result.error || '未知错误'));
          clearUploadTimers();
          finishUploadUI('error');
        } else if (result.status === 'demo_mode') {
          clearUploadTimers();
          handleUploadHTTPResponse(result, generation);
        }
        // For 'processing'/'completed': wait for WS to deliver segments
      } catch (e) {
        if (generation !== resetGeneration || e.name === 'AbortError') return;
        console.error('[Upload] Fetch error:', e);
        if (!uploadWsDelivered) {
          clearUploadTimers();
          uploadFallback(file, generation);
        }
      }
    };

    uploadWs.onmessage = (event) => {
      try {
        if (generation !== resetGeneration) return;
        const msg = JSON.parse(event.data);
        if (msg.type === 'segment') uploadWsDelivered = true;
        if (msg.type === 'complete') {
          uploadWsDelivered = true;
          clearUploadTimers();
        }
        handleUploadWSMessage(msg);
      } catch (e) {
        console.warn('[Upload] Bad WS message:', e);
      }
    };

    uploadWs.onerror = () => {
      console.error('[Upload] WS error');
    };

    uploadWs.onclose = () => {
      console.log('[Upload] WS closed');
      // If WS closed without delivering segments, use HTTP fallback
      if (!uploadWsDelivered && uploadHttpResult) {
        clearUploadTimers();
        // Small delay to let any in-flight messages arrive
        uploadCloseFallbackTimer = setTimeout(() => {
          if (!uploadWsDelivered) {
            handleUploadHTTPResponse(uploadHttpResult, generation);
          }
        }, 1500);
      }
    };

  } catch (e) {
    console.error('[Upload] WS creation failed:', e);
    clearUploadTimers();
    uploadFallback(file, generation);
  }
}

function clearUploadTimers() {
  if (uploadFallbackTimer !== null) {
    clearTimeout(uploadFallbackTimer);
    uploadFallbackTimer = null;
  }
  if (uploadCloseFallbackTimer !== null) {
    clearTimeout(uploadCloseFallbackTimer);
    uploadCloseFallbackTimer = null;
  }
}

async function cancelUploadTask() {
  const fileId = uploadFileId;
  clearUploadTimers();
  if (uploadAbortController) {
    try { uploadAbortController.abort(); } catch (e) { /* ignore */ }
    uploadAbortController = null;
  }
  if (uploadWs) {
    try { uploadWs.close(); } catch (e) { /* ignore */ }
    uploadWs = null;
  }
  uploadHttpResult = null;
  uploadWsDelivered = false;
  uploadFileId = null;
  const btnUpload = $('btnUpload');
  if (btnUpload) { btnUpload.textContent = '上传'; btnUpload.disabled = false; }
  const fileInput = $('fileUpload');
  if (fileInput) fileInput.value = '';

  if (fileId) {
    try {
      await fetch(`${API_BASE}/api/audio/upload/${fileId}/cancel`, { method: 'POST' });
    } catch (e) {
      console.warn('[Upload] cancel request failed:', e);
    }
  }
}

async function uploadFallback(file, generation = resetGeneration) {
  if (generation !== resetGeneration) return;
  // Already tried — don't double-upload
  if (uploadHttpResult) {
    handleUploadHTTPResponse(uploadHttpResult, generation);
    return;
  }

  showToast('正在上传，暂无实时视图...');
  const fileId = uploadFileId || generateUUID();
  try {
    const formData = new FormData();
    formData.append('file', file);
    const resp = await fetch(`${API_BASE}/api/audio/upload?file_id=${fileId}`, {
      method: 'POST', body: formData,
    });
    const result = await resp.json();
    uploadHttpResult = result;
    handleUploadHTTPResponse(result);
  } catch (e) {
    console.error('[Upload] Fallback failed:', e);
    showToast('上传失败，请检查后端是否运行');
    finishUploadUI('error');
  }
  const btnUpload = $('btnUpload');
  if (btnUpload) { btnUpload.textContent = '上传'; btnUpload.disabled = false; }
  const fileInput = $('fileUpload');
  if (fileInput) fileInput.value = '';
}

function handleUploadWSMessage(msg) {
  const panel = processingPanel;

  switch (msg.type) {
    case 'connected':
      console.log('[Upload] WS ready, waiting for file...');
      break;

    case 'status':
      if (panel) {
        panel.innerHTML = `<div class="upload-status-card">
          <div class="stage">处理中：${escapeHTML(msg.data.filename || '')}</div>
          <div style="color:var(--text-muted);">引擎：${escapeHTML(msg.data.engine || '')}</div>
        </div>`;
      }
      break;

    case 'progress':
      if (panel) {
        panel.innerHTML = `<div class="upload-status-card">
          <div class="stage">处理阶段：${escapeHTML(msg.data.stage || '')} (${(msg.data.fraction*100).toFixed(0)}%)</div>
          <div style="color:var(--text-muted);">ASR 优化器将自动分析音量、静音比例和 VAD 参数</div>
        </div>`;
      }
      break;

    case 'segment': {
      const seg = msg.data.segment;
      const segIndex = msg.data.segment_index;

      // Store in allSegments (preserve existing if already set)
      if (!allSegments[segIndex]) {
        allSegments[segIndex] = seg;
      }

      // Do not auto-play recognized audio; users can click a segment to play it.
      const autoPlay = false;

      // Check if segment card already exists
      const existingCard = document.querySelector(`.segment[data-seg-index="${segIndex}"]`);
      if (!existingCard) {
        renderSegment(seg, segIndex, autoPlay);
      }

      // Update counters
      const realCount = allSegments.filter(Boolean).length;
      const totalEst = msg.data.total_estimated || realCount || 50;
      if (segmentCounter) segmentCounter.textContent = `${realCount}/${totalEst}`;
      updateStats(realCount);
      if (progressFill) progressFill.style.width = Math.min(95, (realCount / Math.max(1, totalEst)) * 100) + '%';

      updateLogicPanel();
      break;
    }

    case 'complete':
      showToast(`完成：${msg.data.segments_count || allSegments.filter(Boolean).length} 个片段`);
      // If WS delivered segments but 'complete' has the final full list with audio, use those
      if (msg.data.segments && msg.data.segments.length > 0) {
        const wsCount = allSegments.filter(Boolean).length;
        if (msg.data.segments.length > wsCount) {
          // We got more segments in the complete message — render missing ones
          msg.data.segments.forEach((seg, i) => {
            if (!allSegments[i]) {
              allSegments[i] = seg;
              const existingCard = document.querySelector(`.segment[data-seg-index="${i}"]`);
              if (!existingCard) {
                renderSegment(seg, i, false);
              }
            }
          });
        }
      }
      updateStats(allSegments.filter(Boolean).length);
      renderResultsPanel(msg.data);
      if (memoryVisible) loadMemoryHistory();
      finishUploadUI('complete');
      break;

    case 'error':
      showToast('错误：' + (msg.data?.message || '未知错误'));
      // Try HTTP fallback if WS delivered nothing
      if (!uploadWsDelivered && uploadHttpResult) {
        handleUploadHTTPResponse(uploadHttpResult);
      } else {
        finishUploadUI('error');
      }
      break;

    case 'timeout':
      showToast('处理超时');
      if (!uploadWsDelivered && uploadHttpResult) {
        handleUploadHTTPResponse(uploadHttpResult);
      } else {
        finishUploadUI('timeout');
      }
      break;
  }
}

function finishUploadUI(status) {
  const btnUpload = $('btnUpload');
  if (btnUpload) { btnUpload.textContent = '上传'; btnUpload.disabled = false; }

  if (status === 'complete') {
    updateConnectionStatus('completed');
    if (progressFill) progressFill.style.width = '100%';
    if (overallConfBar) { overallConfBar.style.width = '85%'; overallConfBar.style.background = 'var(--accent-green)'; }
    if (overallConfText) overallConfText.textContent = '85%';
  } else {
    updateConnectionStatus('disconnected');
  }

  if (uploadWs) { uploadWs.close(); uploadWs = null; }
  const fileInput = $('fileUpload');
  if (fileInput) fileInput.value = '';
}

// ═══════════════════════════════════════════════════════════
// Live Mic Recording
// ═══════════════════════════════════════════════════════════

function setMicOrbVisible(visible, subtitle = '') {
  if (!micOrbPanel) return;
  micOrbPanel.classList.toggle('visible', visible);
  micOrbPanel.classList.toggle('listening', visible && isRecording);
  micOrbPanel.setAttribute('aria-hidden', visible ? 'false' : 'true');
  if (micOrbTitle) micOrbTitle.textContent = visible ? '正在听你说话' : '麦克风已停止';
  if (micOrbSubtitle) micOrbSubtitle.textContent = subtitle || (visible ? '音量越大，语音球越活跃' : '');
  if (!visible) updateMicOrbLevel(0);
}

function updateMicOrbLevel(level) {
  const safeLevel = Math.max(0, Math.min(1, level || 0));
  const scale = 1 + safeLevel * 0.42;
  if (micOrbWrap) {
    micOrbWrap.style.setProperty('--orb-level', safeLevel.toFixed(3));
    micOrbWrap.style.setProperty('--orb-scale', scale.toFixed(3));
    micOrbWrap.style.setProperty('--orb-ring-opacity', (0.25 + safeLevel * 0.65).toFixed(3));
    micOrbWrap.style.setProperty('--orb-shadow', (18 + safeLevel * 34).toFixed(1) + 'px');
    micOrbWrap.style.setProperty('--orb-blur', (0.5 + safeLevel * 3).toFixed(1) + 'px');
    micOrbWrap.style.setProperty('--orb-glow-opacity', (0.82 + safeLevel * 0.18).toFixed(3));
    micOrbWrap.style.setProperty('--orb-core-scale', (1 + safeLevel * 0.22).toFixed(3));
    micOrbWrap.style.setProperty('--orb-core-shadow', (20 + safeLevel * 50).toFixed(1) + 'px');
  }
  if (micOrbWave) {
    const bars = micOrbWave.querySelectorAll('span');
    bars.forEach((bar, i) => {
      const phase = Math.sin(performance.now() / 120 + i * 0.72) * 0.5 + 0.5;
      const barLevel = Math.max(0.06, safeLevel * (0.42 + phase * 0.88));
      bar.style.setProperty('--bar-level', barLevel.toFixed(3));
      bar.style.setProperty('--bar-height', (5 + barLevel * 24).toFixed(1) + 'px');
      bar.style.setProperty('--bar-scale', (0.45 + barLevel).toFixed(3));
    });
  }
}

function startMicVisualizer() {
  stopMicVisualizer();
  if (!micAnalyser) return;

  const data = new Float32Array(micAnalyser.fftSize);
  const tick = () => {
    if (!isRecording || !micAnalyser) {
      stopMicVisualizer();
      return;
    }
    micAnalyser.getFloatTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
    const rms = Math.sqrt(sum / data.length);
    const level = Math.min(1, rms * 9);
    micLevelSmoothed = micLevelSmoothed * 0.72 + level * 0.28;
    updateMicOrbLevel(micLevelSmoothed);
    micVisualizerRAF = requestAnimationFrame(tick);
  };
  tick();
}

function stopMicVisualizer() {
  if (micVisualizerRAF !== null) {
    cancelAnimationFrame(micVisualizerRAF);
    micVisualizerRAF = null;
  }
  micLevelSmoothed = 0;
  updateMicOrbLevel(0);
}

async function toggleMic() {
  const btnMic = $('btnMic');
  const micStatusEl = micStatus;

  if (isRecording) {
    stopMicRecording();
    if (btnMic) { btnMic.textContent = '麦克风'; btnMic.classList.remove('active'); }
    if (micStatusEl) micStatusEl.textContent = '';
    return;
  }

  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
    });
    const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    // Resume AudioContext (browsers start it suspended)
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    micAudioContext = audioContext;
    const source = audioContext.createMediaStreamSource(micStream);
    micAnalyser = audioContext.createAnalyser();
    micAnalyser.fftSize = 1024;
    micAnalyser.smoothingTimeConstant = 0.78;
    const processor = audioContext.createScriptProcessor(4096, 1, 1);

    try {
      micWs = new WebSocket('ws://localhost:8765/ws/live');
      micWs.onopen = () => {
        console.log('[Mic] WebSocket connected to /ws/live');
        if (micStatusEl) { micStatusEl.textContent = 'X-ASR Live'; micStatusEl.style.color = 'var(--accent-green)'; }
        setMicOrbVisible(true, '已连接实时识别，开始说话');
      };
      micWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        console.log('[Mic] WS message:', msg.type, msg.data?.text?.slice(0, 40) || '');
        if (msg.type === 'live_result' && msg.data.text) {
          if (msg.data.is_partial) {
            setMicOrbVisible(true, '正在实时转写...');
          } else if (msg.data.is_final) {
            setMicOrbVisible(true, '已收到一句完整识别结果');
          }
          updateMicResult(msg.data);
        }
      };
      micWs.onerror = (e) => {
        console.error('[Mic] WebSocket error:', e);
        if (micStatusEl) { micStatusEl.textContent = 'WS Error'; micStatusEl.style.color = 'var(--accent-red)'; }
        setMicOrbVisible(true, '实时识别连接失败，但仍在显示麦克风输入');
        showToast('WebSocket 连接失败，请检查后端是否运行');
      };
      micWs.onclose = () => {
        console.log('[Mic] WebSocket closed');
      };
    } catch (e) {
      console.error('[Mic] WebSocket creation failed:', e);
      if (micStatusEl) { micStatusEl.textContent = '未连接 WS'; micStatusEl.style.color = 'var(--accent-yellow)'; }
      setMicOrbVisible(true, '未连接后端，仅显示麦克风音量');
    }

    let chunkCount = 0;
    const actualSampleRate = audioContext.sampleRate;
    console.log('[Mic] AudioContext sampleRate:', actualSampleRate, '(requested 16000)');

    processor.onaudioprocess = (e) => {
      if (!isRecording) return;
      const inputData = e.inputBuffer.getChannelData(0);
      chunkCount++;

      // Log audio level every 10 chunks
      if (chunkCount % 10 === 0) {
        let sum = 0;
        for (let i = 0; i < inputData.length; i++) sum += inputData[i] * inputData[i];
        const rms = Math.sqrt(sum / inputData.length);
        console.log(`[Mic] chunk #${chunkCount}, samples=${inputData.length}, RMS=${rms.toFixed(4)}, sr=${actualSampleRate}`);
      }

      if (micWs && micWs.readyState === WebSocket.OPEN) {
        // Resample to 16kHz if AudioContext is running at a different rate
        let audio16k = inputData;
        if (actualSampleRate !== 16000) {
          const ratio = 16000 / actualSampleRate;
          const newLen = Math.round(inputData.length * ratio);
          audio16k = new Float32Array(newLen);
          for (let i = 0; i < newLen; i++) {
            const srcIdx = i / ratio;
            const idx0 = Math.floor(srcIdx);
            const idx1 = Math.min(idx0 + 1, inputData.length - 1);
            const frac = srcIdx - idx0;
            audio16k[i] = inputData[idx0] * (1 - frac) + inputData[idx1] * frac;
          }
        }

        const bytes = new Uint8Array(audio16k.buffer);
        let binary = '';
        for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
        micWs.send(JSON.stringify({ action: 'process_chunk', audio: btoa(binary) }));
      }
    };

    // Connect through zero-gain node to prevent audio feedback to speakers
    const silentGain = audioContext.createGain();
    silentGain.gain.value = 0;
    source.connect(micAnalyser);
    source.connect(processor);
    processor.connect(silentGain);
    silentGain.connect(audioContext.destination);
    isRecording = true;
    setMicOrbVisible(true);
    startMicVisualizer();
    if (btnMic) { btnMic.textContent = '停止'; btnMic.classList.add('active'); }
    if (micStatusEl) { micStatusEl.textContent = '录音中...'; micStatusEl.style.color = 'var(--accent-red)'; }
    showToast('录音已开始');
  } catch (err) {
    console.error('Mic error:', err);
    stopMicVisualizer();
    setMicOrbVisible(false);
    if (micStatusEl) { micStatusEl.textContent = '麦克风被拒绝'; micStatusEl.style.color = 'var(--accent-red)'; }
    showToast('无法访问麦克风');
  }
}

function stopMicRecording() {
  isRecording = false;
  stopMicVisualizer();
  setMicOrbVisible(false);
  micAnalyser = null;
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (micWs) {
    if (micWs.readyState === WebSocket.OPEN) {
      micWs.send(JSON.stringify({ action: 'stop' }));
      // Give backend 500ms to process queued chunks and send final results
      setTimeout(() => {
        if (micWs) { micWs.close(); micWs = null; }
      }, 500);
    } else {
      micWs.close();
      micWs = null;
    }
  }
  if (micAudioContext) {
    micAudioContext.close().catch(() => {});
    micAudioContext = null;
  }
}

function updateMicResult(data) {
  if (!transcriptBody) return;
  if (emptyState) emptyState.style.display = 'none';

  const liveEl = document.getElementById('live-result');
  if (data.is_partial) {
    if (liveEl) {
      const textEl = liveEl.querySelector('.segment-text');
      if (textEl) textEl.textContent = data.text || '...';
      return;
    }
    const html = `<div class="segment no-audio" id="live-result" style="opacity:0.7;">
      <div class="segment-top">
        <span class="segment-speaker" style="color:var(--accent-blue);">实时</span>
        <span class="segment-snr medium">SNR ${(data.snr_db||20).toFixed(0)}dB</span>
      </div>
      <div class="segment-waveform-placeholder"><div class="mini-wave">${Array.from({length: 28}, () => `<div class="mini-wave-bar" style="height:${Math.floor(Math.random()*10+2)}px;"></div>`).join('')}</div></div>
      <div class="segment-text">${escapeHTML(data.text || '（监听中...）')}</div>
    </div>`;
    transcriptBody.insertAdjacentHTML('beforeend', html);
  } else if (data.is_final && data.text) {
    if (liveEl) liveEl.remove();
    const idx = allSegments.length;
    allSegments.push(data);
    renderSegment(data, idx, false);
    updateStats(allSegments.length);

    // Show post-processing corrections if available
    if (data.postprocessed && (data.corrections?.length || data.fillers_removed?.length)) {
      const corrParts = [];
      if (data.fillers_removed?.length) corrParts.push(`停顿词: ${data.fillers_removed.join(', ')}`);
      if (data.corrections?.length) {
        const corrText = data.corrections.map(c => `${c.original}→${c.corrected}`).join(', ');
        corrParts.push(`纠错: ${corrText}`);
      }
      if (corrParts.length) {
        const corrHtml = `<div style="margin-top:4px;padding:4px 10px;font-size:11px;color:var(--text-muted);background:rgba(88,166,255,0.08);border-radius:4px;border-left:2px solid var(--accent-blue);">
          ${escapeHTML(corrParts.join(' | '))}
        </div>`;
        const segs = transcriptBody.querySelectorAll('.segment');
        if (segs.length > 0) segs[segs.length - 1].insertAdjacentHTML('beforeend', corrHtml);
      }
    }
  }
  transcriptBody.scrollTop = transcriptBody.scrollHeight;
}

  const panel = $('memoryPanel');
  if (!panel) return;

async function loadMemoryHistory(q = '') {
  const body = $('memoryPanelBody');
  if (!body) return;
  body.innerHTML = '<div style="font-size:11px;color:var(--text-muted);">正在加载历史...</div>';
  try {
    const url = q
      ? `${API_BASE}/api/memory/history?limit=30&q=${encodeURIComponent(q)}`
      : `${API_BASE}/api/memory/history?limit=30`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!resp.ok || !data.available) {
      const detail = data.reason || data.error || data.detail || `HTTP ${resp.status}`;
      body.innerHTML = `<div style="font-size:11px;color:var(--text-muted);">历史记忆不可用：${escapeHTML(detail)}</div>`;
      return;
    }
    renderMemoryList(data.items || []);
  } catch (e) {
    body.innerHTML = '<div style="font-size:11px;color:var(--accent-red);">加载历史失败，请检查后端是否运行</div>';
  }
}

function renderMemoryList(items) {
  const body = $('memoryPanelBody');
  if (!body) return;
  if (!items.length) {
    body.innerHTML = '<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:12px 0;">暂无历史记录</div>';
    return;
  }
  body.innerHTML = items.map(item => {
    const title = item.filename || item.id || '未命名记录';
    const created = (item.created_at || '').replace('T', ' ').slice(0, 19);
    const hotwords = (item.hotwords || []).slice(0, 5).map(h => typeof h === 'string' ? h : (h.word || '')).filter(Boolean).join(' · ');
    const preview = item.summary_preview || '';
    const fullText = item.full_text_preview || '';
    return `<div class="memory-item" data-memory-id="${escapeHTML(item.id)}">
      <div class="memory-item-title">${escapeHTML(title)}</div>
      <div class="memory-item-meta">${created || '未知时间'} · ${item.segments_count || 0} 段 · ${Math.round(item.duration_sec || 0)}s</div>
      ${hotwords ? `<div class="memory-item-meta">${escapeHTML(hotwords)}</div>` : ''}
      ${preview ? `<div class="memory-item-preview">${escapeHTML(preview)}</div>` : ''}
      <div class="memory-item-fulltext">${escapeHTML(fullText || '该记录暂无可预览文本，点击载入完整详情')}</div>
    </div>`;
  }).join('');
  body.querySelectorAll('.memory-item').forEach(el => {
    el.addEventListener('click', () => openMemoryDetail(el.dataset.memoryId));
  });
}

async function openMemoryDetail(id) {
  if (!id) return;
  const body = $('memoryPanelBody');
  try {
    if (body) body.insertAdjacentHTML('afterbegin', '<div style="font-size:10px;color:var(--text-muted);padding-bottom:4px;">正在载入详情...</div>');
    const resp = await fetch(`${API_BASE}/api/memory/history/${encodeURIComponent(id)}`);
    const record = await resp.json();
    if (record.error) {
      showToast('历史记录读取失败：' + record.error);
      return;
    }
    applyMemoryRecord(record);
    showToast('已载入历史记录');
  } catch (e) {
    showToast('历史记录读取失败');
  }
}

function applyMemoryRecord(record) {
  resetAll();
  if (meetingTitleDisplay) meetingTitleDisplay.textContent = record.filename || '历史记录';
  allSegments = record.segments || [];
  if (transcriptBody) transcriptBody.innerHTML = '';
  if (emptyState) emptyState.style.display = allSegments.length ? 'none' : 'flex';
  allSegments.forEach((seg, i) => renderSegment(seg, i, false));
  if (segmentCounter) segmentCounter.textContent = `${allSegments.length}/${allSegments.length}`;
  updateStats(allSegments.length);
  updateLogicPanel();
  renderResultsPanel({
    hotwords: record.hotwords || [],
    speaker_stats: record.speaker_stats || {},
    summary: record.summary || null,
    asr_optimizer: record.asr_optimizer || null,
  });
  if (summaryPanel) {
    const text = record.full_text || '';
    summaryPanel.innerHTML = `<div style="font-size:12px;color:var(--text-secondary);white-space:pre-wrap;line-height:1.7;">${escapeHTML(text.slice(0, 1200) || '该历史记录暂无全文')}</div>`;
  }
  updateConnectionStatus('completed');
}

async function checkBackendStatus() {
  if (!xasrStatus) return;
  try {
    const resp = await fetch(`${API_BASE}/api/xasr/status`);
    const data = await resp.json();
    if (data.model_available) {
      xasrStatus.innerHTML = 'X-ASR 就绪';
      xasrStatus.style.color = 'var(--accent-green)';
    } else if (data.loading) {
      xasrStatus.innerHTML = 'X-ASR 加载中...';
      xasrStatus.style.color = 'var(--accent-yellow)';
    } else {
      xasrStatus.innerHTML = 'X-ASR 演示模式';
      xasrStatus.style.color = 'var(--accent-orange)';
    }
    updateConnectionStatus('connected');
  } catch (e) {
    xasrStatus.innerHTML = '后端离线';
    xasrStatus.style.color = 'var(--accent-red)';
    updateConnectionStatus('disconnected');
  }
}

// ═══════════════════════════════════════════════════════════
// Event Listeners (replaces inline onclick handlers)
// ═══════════════════════════════════════════════════════════
//
// NOTE: Because <script type="module"> is deferred, DOMContentLoaded
// has ALREADY fired by the time this code runs. We must NOT use
// addEventListener('DOMContentLoaded', ...) — it will never fire.
// Instead, we run initialization directly since the DOM is fully parsed.
// ═══════════════════════════════════════════════════════════

function initApp() {
  checkBackendStatus();
  connectLogStream();

  // Button wiring
  const btnStart = $('btnStart');
  const btnReset = $('btnReset');
  const btnMic = $('btnMic');
  const btnUpload = $('btnUpload');
  const fileUpload = $('fileUpload');
  const btnLog = $('btnLog');
  const logPanelHeader = $('logPanelHeader');
  const btnMemory = $('btnMemory');
  const memoryPanelHeader = $('memoryPanelHeader');
  const btnMemorySearch = $('btnMemorySearch');
  const memorySearchInput = $('memorySearchInput');

  if (btnStart) btnStart.addEventListener('click', startDemo);
  if (btnReset) btnReset.addEventListener('click', resetAll);
  if (btnMic) btnMic.addEventListener('click', toggleMic);
  if (btnUpload) btnUpload.addEventListener('click', () => { if (fileUpload) fileUpload.click(); });
  if (fileUpload) fileUpload.addEventListener('change', handleFileUpload);
  if (btnLog) btnLog.addEventListener('click', toggleLogPanel);
  if (logPanelHeader) logPanelHeader.addEventListener('click', toggleLogPanel);
  if (btnMemory) btnMemory.addEventListener('click', toggleMemoryPanel);
  if (memoryPanelHeader) memoryPanelHeader.addEventListener('click', toggleMemoryPanel);
  if (btnMemorySearch) btnMemorySearch.addEventListener('click', () => loadMemoryHistory(memorySearchInput?.value || ''));
  if (memorySearchInput) memorySearchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadMemoryHistory(memorySearchInput.value || ''); });

  console.log('[DiTing] App initialized — all event listeners registered');
}

// Run immediately — DOM is already parsed (module scripts are deferred)
initApp();

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.target.closest('input,textarea')) {
    e.preventDefault();
    if (!isPlaying) startDemo();
  }
  if (e.code === 'KeyR' && e.ctrlKey) {
    e.preventDefault();
    resetAll();
  }
  if (e.code === 'KeyL' && e.ctrlKey) {
    e.preventDefault();
    toggleLogPanel();
  }
  if (e.code === 'KeyH' && e.ctrlKey) {
    e.preventDefault();
    toggleMemoryPanel();
  }
});
</script>
