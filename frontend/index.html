<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谛听 v4.5 - 智能会议语音认知系统</title>
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Header                                                      -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="header">
  <div class="header-brand">
    <div class="header-logo">E</div>
    <div>
      <div class="header-title">DiTing v4.5</div>
      <div class="header-subtitle">智能会议语音认知系统</div>
    </div>
  </div>
  <div class="header-info">
    <span class="header-meeting-title" id="meetingTitleDisplay">未加载会议</span>
  </div>
  <div class="header-status">
    <span id="xasrStatus" style="font-size:11px;color:var(--text-muted);">检查中...</span>
    <span id="connectionStatus" style="font-size:11px;">⚪ 离线</span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Main Content                                                -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="main-container">
  <!-- Transcript Panel -->
  <div class="transcript-panel">
    <div class="transcript-header">
      <h3>转写文本</h3>
      <span style="font-size:11px;color:var(--text-muted);" id="segmentCounter">0/0</span>
    </div>
    <div class="transcript-body" id="transcriptBody">
      <div class="empty-state" id="emptyState" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:150px;color:var(--text-muted);gap:8px;">
        <div style="font-size:40px;opacity:0.3;">麦克风</div>
        <div>等待会议输入...</div>
        <div style="font-size:11px;">点击【演示】或上传音频文件</div>
      </div>
    </div>
  </div>

  <!-- Right Sidebar -->
  <div class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-card-header">统计</div>
      <div class="sidebar-card-body">
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" style="color:var(--accent-blue);" id="statSegments">0</div>
            <div class="stat-label">分段</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color:var(--accent-orange);" id="statLogicFlags">0</div>
            <div class="stat-label">逻辑提示</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color:var(--accent-red);" id="statLowConf">0</div>
            <div class="stat-label">低置信</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color:var(--accent-green);" id="statCorrections">0</div>
            <div class="stat-label">纠错</div>
          </div>
        </div>
        <div style="margin-top:8px;">
          <div style="height:3px;background:var(--bg-tertiary);border-radius:2px;overflow:hidden;">
            <div id="overallConfBar" style="height:100%;width:0%;background:var(--accent-green);border-radius:2px;transition:width 0.5s;"></div>
          </div>
          <div style="font-size:10px;text-align:right;color:var(--text-muted);margin-top:2px;" id="overallConfText">--</div>
        </div>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-header">处理状态</div>
      <div class="sidebar-card-body" id="processingPanel">
        <div style="font-size:11px;color:var(--text-muted);text-align:center;padding:10px 0;">等待输入...</div>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-header">逻辑校验</div>
      <div class="sidebar-card-body" id="logicPanel">
        <div style="font-size:11px;color:var(--text-muted);text-align:center;padding:10px 0;">暂无数据</div>
      </div>
    </div>
  </div>

  <!-- 摘要 Panel -->
  <div class="summary-panel" id="summaryPanel">
    <div style="font-size:12px;color:var(--text-muted);text-align:center;">
      会议处理完成后将生成摘要...
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 分析结果面板 (v3.1)                                         -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="results-panel" id="resultsPanel">
  <!-- 领域卡片 -->
  <div class="results-card">
    <div class="results-card-header">会议领域</div>
    <div class="results-card-body" id="domainCard">
      <div class="summary-empty">分析中…</div>
    </div>
  </div>

  <!-- 热词卡片 -->
  <div class="results-card">
    <div class="results-card-header">关键术语</div>
    <div class="results-card-body" id="hotwordCard">
      <div class="summary-empty">提取中…</div>
    </div>
  </div>

  <!-- 说话人卡片 -->
  <div class="results-card">
    <div class="results-card-header">说话人分布</div>
    <div class="results-card-body" id="speakerCard">
      <div class="summary-empty">识别中…</div>
    </div>
  </div>

  <!-- 摘要卡片 -->
  <div class="results-card">
    <div class="results-card-header">会议摘要</div>
    <div class="results-card-body" id="summaryCard">
      <div class="summary-empty">会议处理完成后将自动生成摘要…</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Controls Bar                                                -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="controls-bar">
  <button class="btn btn-primary" id="btnStart">演示</button>
  <button class="btn btn-secondary" id="btnReset">重置</button>
  <span style="color:var(--text-muted);margin:0 4px;">|</span>
  <button class="btn btn-secondary" id="btnMic">麦克风</button>
  <button class="btn btn-secondary" id="btnUpload">上传</button>
  <input type="file" id="fileUpload" accept="audio/*" style="display:none">
  <span style="font-size:10px;color:var(--text-muted);" id="micStatus"></span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="time-display" id="timeDisplay">--:--</div>
  <button class="btn btn-secondary" id="btnLog" style="font-size:10px;">日志</button>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Live Mic Voice Orb                                          -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="mic-orb-panel" id="micOrbPanel" aria-hidden="true">
  <div class="mic-orb-wrap" id="micOrbWrap">
    <div class="mic-orb-ring"></div>
    <div class="mic-orb-glow"></div>
    <div class="mic-orb-core"></div>
  </div>
  <div class="mic-orb-wave" id="micOrbWave">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="mic-orb-title" id="micOrbTitle">正在听你说话</div>
  <div class="mic-orb-subtitle" id="micOrbSubtitle">音量越大，语音球越活跃</div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Debug Log Panel                                             -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="log-panel" id="logPanel">
  <div class="log-panel-header" id="logPanelHeader">
    <span>调试日志</span>
    <span style="font-size:10px;color:var(--text-muted);">点击关闭</span>
  </div>
  <div class="log-panel-body" id="logPanelBody"><div>连接中...</div></div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Scripts                                                     -->
<!-- ═══════════════════════════════════════════════════════════ -->
<script type="module" src="./js/app.js"></script>
</body>
</html>
